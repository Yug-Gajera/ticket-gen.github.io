<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | Conference ticket generator</title>

</head>
<body>
  
  <div class= "hero">
      <img src="/assets/images/pattern-squiggly-line-bottom-desktop.svg" class = "bg-img img1" alt="">
      <img src="/assets/images/pattern-squiggly-line-top.svg" class = "bg-img img2" alt="">
      <img src="/assets/images/pattern-lines.svg" class = "bg-img img3" alt="">
    <div class = 'header'>
      <img src="/assets/images/logo-full.svg" alt="">
    </div>
    <div class = 'header2'>
      <h1>Your Journey to Coding Conf
        <span class = "sub-text">2025 Starts Here!</span>
      </h1>
    </div>
    <div class = 'message'>
      <h2>Secure your spot at next year's biggest coding conference.</h2>
    </div>
    
      <form action="/style.css">
        <label for="Avatar">
          Upload Avatar
        </label><br>
        <input type="file" name = "Avatar"><br>
        <label for="username">
          Full Name
        </label><br>
        <input type="text"><br>
        <label for="email">
          Email Address
        </label><br>
        <input type="email" name="email" id=""><br>
        <label for="github">
          GitHub Username
        </label><br>
        <input type="text"><br>
        <button type="submit">
          Generate My Ticket
        </button>
      </form>
  </div>
</body>
</html>
